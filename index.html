<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Live Tracking</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    html, body { height: 100%; margin: 0; font-family: sans-serif; }
    #map { height: 100%; }

    /* ── Buttons oben links ── */
    #resetBtn {
      position: absolute;
      top: 10px;
      left: 50px;
      z-index: 9999;
      padding: 8px 12px;
      background: white;
      border: 1px solid #ccc;
      cursor: pointer;
      border-radius: 4px;
    }

    #teamCarToggle {
      position: absolute;
      top: 50px;
      left: 50px;
      z-index: 9999;
      padding: 8px 12px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      user-select: none;
    }

    #teamCarToggle input[type="checkbox"] {
      cursor: pointer;
      width: 15px;
      height: 15px;
      accent-color: #e53935;
    }

    #teamCarToggle.active {
      border-color: #e53935;
      color: #c62828;
    }

    /* ── Status oben rechts ── */
    #status {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 9999;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
      background: white;
      border: 1px solid #ccc;
    }
    #status.ok   { border-color: #4caf50; color: #2e7d32; }
    #status.warn { border-color: #f44336; color: #c62828; }

    /* ── Regen-Panel ── */
    #rainPanel {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: rgba(255,255,255,0.96);
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px 16px 8px;
      min-width: 320px;
      max-width: 440px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.18);
      display: none; /* starts hidden */
    }

    #rainPanel.visible { display: block; }

    #rainPanel .rain-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: 600;
      color: #1a237e;
    }

    #rainPanel .rain-header span { font-weight: 400; color: #555; font-size: 12px; }

    #rainTimeline {
      display: flex;
      gap: 3px;
      margin-bottom: 8px;
      align-items: flex-end;
    }

    .rain-frame-btn {
      flex: 1;
      height: 28px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 9px;
      padding: 0 2px;
      transition: transform 0.1s;
      background: #e8eaf6;
      color: #3949ab;
      line-height: 1.2;
      text-align: center;
      overflow: hidden;
    }

    .rain-frame-btn.forecast {
      background: #fff3e0;
      color: #e65100;
    }

    .rain-frame-btn.active {
      transform: scaleY(1.15);
      outline: 2px solid #1565c0;
    }

    #rainControls {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    #playBtn {
      background: #1565c0;
      color: white;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      cursor: pointer;
      font-size: 13px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #playBtn:hover { background: #0d47a1; }

    #rainTimeLabel {
      flex: 1;
      color: #333;
      font-size: 12px;
    }

    #opacitySlider {
      width: 70px;
      accent-color: #1565c0;
    }

    #rainOpacityLabel { color: #777; font-size: 11px; white-space: nowrap; }

    /* ── Regen-Toggle-Button ── */
    #rainToggleBtn {
      position: absolute;
      top: 90px;
      left: 50px;
      z-index: 9999;
      padding: 8px 12px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      user-select: none;
    }

    #rainToggleBtn.active {
      background: #e3f2fd;
      border-color: #1565c0;
      color: #0d47a1;
    }

    .legend-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }

    .legend-bar div { flex: 1; }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      color: #888;
      margin-top: 2px;
    }
  </style>
</head>
<body>

<button id="resetBtn">🧹 Karte leeren</button>

<label id="teamCarToggle">
  <input type="checkbox" id="teamCarCheckbox"> 🚗 Mein Standort (Teamauto)
</label>

<button id="rainToggleBtn">🌧️ Regen-Radar</button>

<div id="status" class="warn">⚪ Warte auf Daten…</div>
<div id="map"></div>

<!-- Regen-Panel -->
<div id="rainPanel">
  <div class="rain-header">
    🌦️ Niederschlag-Radar
    <span id="rainSourceLabel">– RainViewer</span>
  </div>

  <div id="rainTimeline"></div>

  <div id="rainControls">
    <button id="playBtn" title="Play/Pause">▶</button>
    <span id="rainTimeLabel">–</span>
    <label id="rainOpacityLabel">
      Deckkraft&nbsp;<input type="range" id="opacitySlider" min="10" max="100" value="60">
    </label>
  </div>

  <!-- Farb-Legende -->
  <div class="legend-bar">
    <div style="background:#97d1c6"></div>
    <div style="background:#4bbbdb"></div>
    <div style="background:#2895d3"></div>
    <div style="background:#2659b6"></div>
    <div style="background:#0e3086"></div>
    <div style="background:#1c993b"></div>
    <div style="background:#36cd42"></div>
    <div style="background:#f1e21e"></div>
    <div style="background:#f4a31e"></div>
    <div style="background:#f06a1e"></div>
    <div style="background:#e82313"></div>
    <div style="background:#8b1313"></div>
  </div>
  <div class="legend-labels">
    <span>Leicht</span><span>Mäßig</span><span>Stark</span><span>Extrem</span>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>

// =======================
// MAP
// =======================
const map = L.map('map').setView([52.52, 13.405], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19
}).addTo(map);


// =======================
// STATE
// =======================
const markers       = {};
const lastPositions = {};
const trails        = {};

let firstDevice  = true;
let lastDataTime = null;


// =======================
// TEAMAUTO – EIGENER MARKER (ROT)
// =======================
const teamCarIcon = L.divIcon({
  className: '',
  html: `<div style="
    background: #e53935;
    border: 3px solid white;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    width: 22px; height: 22px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  "></div>`,
  iconSize: [28, 28],
  iconAnchor: [14, 28],
  tooltipAnchor: [0, -28]
});

let teamCarMarker    = null;
let teamCarWatchId   = null;
let teamCarAccCircle = null;

function startTeamCarTracking() {
  if (!navigator.geolocation) {
    alert("GPS wird von diesem Browser nicht unterstützt.");
    document.getElementById('teamCarCheckbox').checked = false;
    return;
  }
  teamCarWatchId = navigator.geolocation.watchPosition(
    (pos) => {
      const latlng   = [pos.coords.latitude, pos.coords.longitude];
      const accuracy = pos.coords.accuracy;
      if (!teamCarMarker) {
        teamCarMarker = L.marker(latlng, { icon: teamCarIcon, zIndexOffset: 1000 })
          .addTo(map).bindTooltip('🚗 Teamauto', { permanent: true, direction: 'top' });
        teamCarAccCircle = L.circle(latlng, {
          radius: accuracy, color: '#e53935',
          fillColor: '#e53935', fillOpacity: 0.08, weight: 1
        }).addTo(map);
      } else {
        teamCarMarker.setLatLng(latlng);
        teamCarAccCircle.setLatLng(latlng);
        teamCarAccCircle.setRadius(accuracy);
      }
    },
    (err) => {
      console.error("❌ Geolocation-Fehler:", err.message);
      if (err.code === 1) {
        alert("GPS-Zugriff verweigert.");
        document.getElementById('teamCarCheckbox').checked = false;
        document.getElementById('teamCarToggle').classList.remove('active');
      }
    },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
  );
}

function stopTeamCarTracking() {
  if (teamCarWatchId !== null) { navigator.geolocation.clearWatch(teamCarWatchId); teamCarWatchId = null; }
  if (teamCarMarker)    { map.removeLayer(teamCarMarker);    teamCarMarker    = null; }
  if (teamCarAccCircle) { map.removeLayer(teamCarAccCircle); teamCarAccCircle = null; }
}

document.getElementById('teamCarCheckbox').addEventListener('change', function () {
  const toggle = document.getElementById('teamCarToggle');
  if (this.checked) { toggle.classList.add('active'); startTeamCarTracking(); }
  else              { toggle.classList.remove('active'); stopTeamCarTracking(); }
});


// =======================
// STATUS
// =======================
const statusEl = document.getElementById('status');

function updateStatus() {
  if (!lastDataTime) return;
  const ago = (Date.now() - lastDataTime) / 1000;
  if (ago < 5) {
    statusEl.className   = 'ok';
    statusEl.textContent = '🟢 Verbunden';
  } else {
    statusEl.className   = 'warn';
    statusEl.textContent = `🔴 Kein Signal seit ${Math.round(ago)}s`;
  }
}
setInterval(updateStatus, 1000);


// =======================
// SMOOTH MARKER MOVEMENT
// =======================
function animateMarker(marker, from, to, duration = 800) {
  const start = performance.now();
  function step(time) {
    const t   = Math.min((time - start) / duration, 1);
    const lat = from[0] + (to[0] - from[0]) * t;
    const lng = from[1] + (to[1] - from[1]) * t;
    marker.setLatLng([lat, lng]);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}


// =======================
// LOAD POSITIONS
// =======================
async function loadPositions() {
  try {
    const res  = await fetch('https://livetracking-production-cf84.up.railway.app/positions');
    const data = await res.json();
    const ids  = Object.keys(data);
    if (ids.length === 0) return;

    lastDataTime = Date.now();

    ids.forEach(id => {
      const pos    = data[id];
      const latlng = [pos.lat, pos.lon];

      if (!trails[id]) {
        trails[id] = L.polyline([], { color: '#3388ff', weight: 3, opacity: 0.6 }).addTo(map);
      }

      if (!markers[id]) {
        markers[id] = L.marker(latlng).addTo(map)
          .bindTooltip(id, { permanent: true, direction: 'top' });
        lastPositions[id] = latlng;
        if (firstDevice) { map.setView(latlng, 15); firstDevice = false; }
      } else {
        animateMarker(markers[id], lastPositions[id], latlng);
        const prev  = lastPositions[id];
        const moved = Math.abs(prev[0] - latlng[0]) > 0.000005 ||
                      Math.abs(prev[1] - latlng[1]) > 0.000005;
        if (moved) trails[id].addLatLng(latlng);
        lastPositions[id] = latlng;
      }

      map.panTo(latlng, { animate: true, duration: 0.6 });
    });
  } catch (err) {
    console.error("💥 Fetch Fehler:", err);
  }
}


// =======================
// RESET
// =======================
async function clearMap() {
  await fetch('https://livetracking-production-cf84.up.railway.app/positions', { method: 'DELETE' });

  Object.keys(markers).forEach(id => map.removeLayer(markers[id]));
  Object.keys(trails).forEach(id  => map.removeLayer(trails[id]));
  Object.keys(markers).forEach(id       => delete markers[id]);
  Object.keys(trails).forEach(id        => delete trails[id]);
  Object.keys(lastPositions).forEach(id => delete lastPositions[id]);

  lastDataTime         = null;
  firstDevice          = true;
  statusEl.className   = 'warn';
  statusEl.textContent = '⚪ Warte auf Daten…';
}

document.getElementById("resetBtn").addEventListener("click", clearMap);


// =======================
// 🌧️ REGEN-RADAR (RainViewer)
// =======================
const RAINVIEWER_API = 'https://api.rainviewer.com/public/weather-maps.json';
const TILE_SIZE      = 256;
const COLOR_SCHEME   = 2;   // Standard-Radarfarben
const SMOOTH         = 1;
const SNOW           = 1;   // Schnee einblenden

let rainFrames      = [];   // { time, path, isForecast }
let currentFrame    = -1;
let rainLayer       = null;
let rainVisible     = false;
let isPlaying       = false;
let playInterval    = null;
let rainOpacity     = 0.60;

const rainPanel      = document.getElementById('rainPanel');
const rainTimeline   = document.getElementById('rainTimeline');
const rainTimeLabel  = document.getElementById('rainTimeLabel');
const playBtn        = document.getElementById('playBtn');
const opacitySlider  = document.getElementById('opacitySlider');
const rainToggleBtn  = document.getElementById('rainToggleBtn');

function formatTime(unixTs) {
  const d = new Date(unixTs * 1000);
  return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}

function buildTileUrl(host, path) {
  return `${host}${path}/${TILE_SIZE}/{z}/{x}/{y}/${COLOR_SCHEME}/${SMOOTH}_${SNOW}.png`;
}

async function fetchRainFrames() {
  try {
    const res  = await fetch(RAINVIEWER_API);
    const data = await res.json();

    const host = data.host || 'https://tilecache.rainviewer.com';
    rainFrames = [];

    const nowcast = data.radar?.nowcast || [];
    const past    = data.radar?.past    || [];

    if (nowcast.length > 0) {
      // Vorhersage vorhanden → nur Nowcast zeigen
      nowcast.forEach(f => rainFrames.push({ time: f.time, path: f.path, host, isForecast: true }));
    } else if (past.length > 0) {
      // Kein Niederschlag aktuell → letzte 3 Radar-Frames als "aktuelle Lage"
      past.slice(-3).forEach(f => rainFrames.push({ time: f.time, path: f.path, host, isForecast: false }));
    }

    console.log(`🌧️ RainViewer: ${nowcast.length} nowcast, ${past.length} past → zeige ${rainFrames.length} frames`);

    if (rainFrames.length === 0) {
      rainTimeLabel.textContent = 'Keine Radardaten verfügbar';
      return;
    }

    buildTimeline();
    showFrame(0);

  } catch (err) {
    console.error("🌧️ RainViewer Fehler:", err);
    rainTimeLabel.textContent = 'Fehler beim Laden der Radardaten';
  }
}

function buildTimeline() {
  rainTimeline.innerHTML = '';
  rainFrames.forEach((f, i) => {
    const btn = document.createElement('button');
    btn.className = 'rain-frame-btn' + (f.isForecast ? ' forecast' : '');
    btn.textContent = formatTime(f.time);
    btn.title = (f.isForecast ? 'Vorhersage ' : 'Radar ') + formatTime(f.time);
    btn.addEventListener('click', () => { stopPlay(); showFrame(i); });
    rainTimeline.appendChild(btn);
  });
}

function showFrame(index) {
  if (index < 0 || index >= rainFrames.length) return;

  if (rainLayer) { map.removeLayer(rainLayer); rainLayer = null; }

  currentFrame = index;
  const frame  = rainFrames[index];

  rainLayer = L.tileLayer(buildTileUrl(frame.host, frame.path), {
    opacity:        rainOpacity,
    zIndex:         500,
    tileSize:       TILE_SIZE,
    attribution:    '© RainViewer',
    maxNativeZoom:  8,
    maxZoom:        19
  }).addTo(map);

  document.querySelectorAll('.rain-frame-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });

  const prefix = frame.isForecast ? '🔮 Vorhersage' : '📡 Aktuell';
  rainTimeLabel.textContent = `${prefix} ${formatTime(frame.time)}`;
}

function nextFrame() {
  if (rainFrames.length === 0) return;
  const next = (currentFrame + 1) % rainFrames.length;
  showFrame(next);
}

function startPlay() {
  isPlaying    = true;
  playBtn.textContent = '⏸';
  playInterval = setInterval(nextFrame, 700);
}

function stopPlay() {
  isPlaying    = false;
  playBtn.textContent = '▶';
  clearInterval(playInterval);
  playInterval = null;
}

playBtn.addEventListener('click', () => {
  if (isPlaying) stopPlay(); else startPlay();
});

opacitySlider.addEventListener('input', function () {
  rainOpacity = this.value / 100;
  if (rainLayer) rainLayer.setOpacity(rainOpacity);
});

// Radar alle 5 Min aktualisieren
setInterval(() => { if (rainVisible) fetchRainFrames(); }, 5 * 60 * 1000);

// Toggle-Button
rainToggleBtn.addEventListener('click', () => {
  rainVisible = !rainVisible;

  if (rainVisible) {
    rainToggleBtn.classList.add('active');
    rainPanel.classList.add('visible');
    fetchRainFrames();
  } else {
    rainToggleBtn.classList.remove('active');
    rainPanel.classList.remove('visible');
    stopPlay();
    if (rainLayer) { map.removeLayer(rainLayer); rainLayer = null; }
  }
});


// =======================
// LOOP
// =======================
loadPositions();
setInterval(loadPositions, 1000);

</script>
</body>
</html>
